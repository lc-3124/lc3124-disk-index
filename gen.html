<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lc3124的下载站：身份校验！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Microsoft YaHei", Arial, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      max-width: 700px;
      width: 100%;
      padding: 40px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .page-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .title-divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #4299e1, #38b2ac);
      margin: 0 auto 30px;
      border-radius: 3px;
    }
    
    .auth-tip {
      background: linear-gradient(135deg, #e8f4f8 0%, #f0f8fb 100%);
      border: 1px solid #dee2e6;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      position: relative;
      padding-left: 20px;
    }
    
    .auth-tip p {
      color: #2d3748;
      line-height: 1.8;
      font-size: 15px;
    }
    
    .auth-tip p strong {
      color: #4299e1;
      font-weight: 600;
    }
    
    .auth-tip p.warning {
      color: #e53e3e;
      font-weight: 600;
      margin-top: 8px;
    }
    
    .input-group {
      margin: 25px 0;
    }
    
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #2d3748;
      font-size: 15px;
      letter-spacing: 0.3px;
    }
    
    input, textarea {
      width: 100%;
      padding: 15px 20px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background-color: #f8fafc;
      resize: vertical;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.1);
      background-color: #ffffff;
    }
    
    input[type="password"] {
      font-family: "Courier New", monospace;
    }
    
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4299e1 0%, #38b2ac 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 15px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(66, 153, 225, 0.2);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(66, 153, 225, 0.3);
    }
    
    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(66, 153, 225, 0.2);
    }
    
    /* 修改一键导入按钮样式：尺寸缩小 */
    button#importBtn {
      background: linear-gradient(135deg, #9f7aea 0%, #667eea 100%);
      margin-top: 5px;
      width: auto; /* 取消100%宽度 */
      padding: 8px 16px; /* 缩小内边距 */
      font-size: 14px; /* 缩小字体 */
      display: inline-block; /* 行内块级，适配内容宽度 */
    }
    
    /* 移除结果提示的边框和背景样式 */
    #result {
      margin-top: 30px;
      padding: 20px 0; /* 仅保留上下内边距，取消左右内边距 */
      min-height: 40px; /* 缩小最小高度 */
      font-size: 15px;
      line-height: 1.8;
      text-align: center;
      transition: all 0.3s ease;
      /* 移除边框、背景相关样式 */
      border: none;
      border-radius: 0;
      background-color: transparent;
    }
    
    .sdk-error {
      color: #ed8936;
      padding: 18px;
      background: #fef7fb;
      border-radius: 12px;
      margin-bottom: 25px;
      display: none;
      border-left: 4px solid #ed8936;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(237, 137, 54, 0.1);
    }
    
    .success {
      color: #38a169;
      font-weight: 600;
    }
    
    .error {
      color: #e53e3e;
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 30px 20px;
      }
      .page-title {
        font-size: 20px;
      }
      .auth-tip {
        padding: 15px;
        padding-left: 15px;
      }
      /* 移动端一键导入按钮适配 */
      button#importBtn {
        width: 100%;
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1 class="page-title">Lc3124的下载站：身份校验！</h1>
  <div class="title-divider"></div>

  <div id="sdkError" class="sdk-error">
    OSS SDK加载失败！<br>1. 检查oss-sdk.min.js是否和本文件同目录；<br>2. 确认文件为官方正版。
  </div>

  <div class="auth-tip">
    <p>为了防止链接滥用，我开启了访问控制！请验证你的身份后点击下载！</p>
    <p>链接获取方式为使用密钥临时生成，链接一小时过期！</p>
    <p>密钥验证方式：输入lc给你的<strong>AccessKeyId</strong>和<strong>AccessKeySecret</strong>！</p>
    <p>没有这些东西？！<br>请找lc去要一份哦～</p>
    <p class="warning">注意！AccessKey一定一定不要透露出去！</p>
  </div>

  <!-- 一键导入 -->
  <div class="input-group">
    <label for="importKeys">一键导入钥匙对(也可以手动填写)：</label>
    <textarea id="importKeys" rows="3" placeholder="粘贴格式示例：
accessKeyId: 请输入你的AccessKeyId
accessKeySecret: 请输入你的AccessKeySecret"></textarea>
  </div>
  <button id="importBtn" onclick="importKeys()">一键导入</button>

  <div class="input-group">
    <label for="accessKeyId">AccessKeyId：</label>
    <input 
      type="text" 
      id="accessKeyId" 
      placeholder="AccessKeyId" 
      value="">
  </div>

  <div class="input-group">
    <label for="accessKeySecret">AccessKeySecret：</label>
    <input 
      type="password" 
      id="accessKeySecret" 
      placeholder="AccessKeySecret" 
      value="">
  </div>

  <div class="input-group">
    <label for="bucket">Bucket名称：</label>
    <input type="text" id="bucket" placeholder="Bucket名称" value="lc3124-web-disk">
  </div>

  <div class="input-group">
    <label for="region">Bucket地域：</label>
    <input type="text" id="region" placeholder="Bucket地域" value="oss-cn-beijing">
  </div>

  <div class="input-group">
    <label for="objectName">文件路径：</label>
    <input type="text" id="objectName" placeholder="例如：/files/photo/avatar.png">
  </div>

  <div class="input-group">
    <label for="expires">有效期（秒）：</label>
    <input type="number" id="expires" placeholder="3600" value="3600" min="300" max="86400">
  </div>

  <button onclick="generateOssUrl()">直接下载</button>
  <div id="result">点击按钮开始下载</div>
</div>

<script src="./oss-sdk.min.js" 
        onload="console.log('OSS SDK加载成功')" 
        onerror="document.getElementById('sdkError').style.display='block'">
</script>

<script>
  // 解析URL参数
  function getUrlParam(name) {
    const reg = new RegExp(`(^|&)${name}=([^&]*)(&|$)`);
    const r = window.location.search.substr(1).match(reg);
    if (r != null) return decodeURIComponent(r[2]);
    return '';
  }

  // 一键导入钥匙对
  function importKeys() {
    const text = document.getElementById('importKeys').value.trim();
    if (!text) {
      document.getElementById('result').innerHTML = '<span class="error">请先粘贴钥匙对内容</span>';
      return;
    }

    const lines = text.split(/\n/);
    let ak = '', sk = '';

    lines.forEach(line => {
      const l = line.trim();
      if (l.toLowerCase().startsWith('accesskeyid:')) {
        ak = l.split(':')[1]?.trim() || '';
      }
      if (l.toLowerCase().startsWith('accesskeysecret:')) {
        sk = l.split(':')[1]?.trim() || '';
      }
    });

    if (ak) document.getElementById('accessKeyId').value = ak;
    if (sk) document.getElementById('accessKeySecret').value = sk;

    document.getElementById('result').innerHTML = 
      '<span class="success">✅ 导入成功，已自动填充钥匙对</span>';
  }

  // 核心下载函数
  async function generateOssUrl() {
    if (typeof OSS === 'undefined') {
      document.getElementById('result').innerHTML = '<span class="error">错误：OSS SDK未加载成功！</span>';
      return;
    }

    const accessKeyId = document.getElementById('accessKeyId').value.trim();
    const accessKeySecret = document.getElementById('accessKeySecret').value.trim();
    const bucket = document.getElementById('bucket').value.trim();
    const region = document.getElementById('region').value.trim();
    const objectName = document.getElementById('objectName').value.trim();
    const expires = parseInt(document.getElementById('expires').value) || 3600;

    if (!accessKeyId || !accessKeySecret || !bucket || !region || !objectName) {
      document.getElementById('result').innerHTML = '<span class="error">错误：所有输入项均不能为空！</span>';
      return;
    }

    if (expires < 300 || expires > 86400) {
      document.getElementById('result').innerHTML = '<span class="error">错误：有效期需在300-86400秒之间！</span>';
      return;
    }

    try {
      const client = new OSS({
        accessKeyId: accessKeyId,
        accessKeySecret: accessKeySecret,
        bucket: bucket,
        region: region
      });

      const downloadUrl = client.signatureUrl(objectName, {
        expires: expires,
        method: 'GET'
      });

      document.getElementById('result').innerHTML = 
        '<span class="success">✅ 身份验证通过，正在跳转下载...5秒后自动关闭</span>';
      window.open(downloadUrl, '_blank');

      setTimeout(() => {
        try { window.close(); } catch (e) {
          document.getElementById('result').innerHTML = 
            '<span class="success">✅ 下载已开始，可手动关闭本页</span>';
        }
      }, 5000);

    } catch (error) {
      document.getElementById('result').innerHTML = 
        `<span class="error">❌ 下载失败：${error.message}</span>`;
      console.error('下载失败详情：', error);
    }
  }

  window.onload = function () {
    if (typeof OSS === 'undefined') {
      document.getElementById('sdkError').style.display = 'block';
    }
    const defaultPath = getUrlParam('path');
    if (defaultPath) {
      document.getElementById('objectName').value = defaultPath;
    }
  };
</script>
</body>
</html>
